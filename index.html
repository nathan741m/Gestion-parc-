<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin iPad</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.container{
  display:flex;
  height:100vh;
}

/* GAUCHE /
.left{
  width:40%;
  background:#020617;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(3,90px);
  gap:15px;
}

button{
  font-size:24px;
  padding:18px;
  border:none;
  border-radius:12px;
  background:#1e293b;
  color:white;
}

button:active{
  background:#334155;
}

.valider{
  background:#22c55e;
  font-size:20px;
}

/ DROITE */
.right{
  width:60%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.temps{
  font-size:70px;
  margin-bottom:40px;
}

input[type=range]{
  width:70%;
}
</style>
</head>

<body>

<div class="container">

  <!-- GAUCHE -->
  <div class="left">
    <h2>👥 Passagers: <span id="count">0</span></h2>

    <div class="buttons">
      <button onclick="add(1)">1</button>
      <button onclick="add(2)">2</button>
      <button onclick="add(3)">3</button>
      <button onclick="add(4)">4</button>
      <button onclick="add(5)">5</button>
      <button onclick="add(6)">6</button>
    </div>

    <button class="valider" onclick="valider()">✅ Valider</button>
  </div>

  <!-- DROITE -->
  <div class="right">
    <div class="temps">
      ⏳ <span id="temps">5</span> min
    </div>

    <input type="range" min="5" max="75" value="5" id="slider">
  </div>

</div>

<script>
let tempCount = 0;

// ajouter passagers
function add(n){
  tempCount += n;
  document.getElementById("count").innerText = tempCount;
}

// slider temps
const slider = document.getElementById("slider");
slider.oninput = () => {
  document.getElementById("temps").innerText = slider.value;
};

// valider
function valider(){
  const temps = slider.value;

  console.log("Passagers:", tempCount);
  console.log("Temps:", temps);

  alert("Envoyé !");

  tempCount = 0;
  document.getElementById("count").innerText = 0;
}
</script>

</body>
</html>
