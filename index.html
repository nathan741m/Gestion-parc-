}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Parc</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.container{
  display:flex;
  height:100vh;
}

/* GAUCHE = TEMPS /
.left{
  width:50%;
  background:#020617;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:25px;
}

.temps{
  font-size:75px;
}

input[type=range]{
  width:75%;
}

.updateTemps{
  padding:15px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
}

.status{
  font-size:22px;
  padding:10px 20px;
  border-radius:10px;
  background:#22c55e;
}

.status.closed{
  background:#ef4444;
}

/ DROITE = PASSAGERS */
.right{
  width:50%;
  background:#0b1220;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:25px;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(3,110px);
  gap:18px;
}

button{
  font-size:28px;
  padding:22px;
  border:none;
  border-radius:14px;
  background:#1e293b;
  color:white;
}

button:active{
  background:#334155;
}

.valider{
  background:#22c55e;
  font-size:22px;
  padding:18px 30px;
  border-radius:12px;
}

.closeBtn{
  background:#ef4444;
  font-size:20px;
  padding:12px 25px;
  border-radius:10px;
}

h2{
  font-size:28px;
}
</style>
</head>

<body>

<div class="container">

  <!-- GAUCHE -->
  <div class="left">

    <div class="temps">
      ⏳ <span id="temps">5</span> min
    </div>

    <input type="range" min="5" max="75" value="5" id="slider">

    <button class="updateTemps" onclick="updateTemps()">
      🔄 Mettre à jour le temps
    </button>

    <div id="status" class="status">
      🟢 OUVERT
    </div>

    <button class="closeBtn" onclick="toggleClosed()">
      🚫 Fermer / Ouvrir
    </button>

  </div>

  <!-- DROITE -->
  <div class="right">

    <h2>👥 Passagers: <span id="count">0</span></h2>

    <div class="buttons">
      <button onclick="add(1)">1</button>
      <button onclick="add(2)">2</button>
      <button onclick="add(3)">3</button>
      <button onclick="add(4)">4</button>
      <button onclick="add(5)">5</button>
      <button onclick="add(6)">6</button>
    </div>

    <button class="valider" onclick="valider()">✅ Valider</button>

  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

// 🔥 CONFIG FIREBASE (REMPLACE PAR TES INFOS)
const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "TON_AUTH_DOMAIN",
  databaseURL: "TON_DATABASE_URL",
  projectId: "TON_PROJECT_ID",
  storageBucket: "TON_BUCKET",
  messagingSenderId: "TON_SENDER",
  appId: "TON_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let tempCount = 0;
let totalPassengers = 0;
let isClosed = false;

// ajouter passagers
window.add = (n) => {
  tempCount += n;
  document.getElementById("count").innerText = tempCount;
};

// slider
const slider = document.getElementById("slider");
slider.oninput = () => {
  document.getElementById("temps").innerText = slider.value;
};

// update temps
window.updateTemps = () => {
  document.getElementById("temps").innerText = slider.value;
};

// valider = envoyer à Firebase
window.valider = () => {
  totalPassengers += tempCount;

  set(ref(db, "attraction1"), {
    temps: slider.value,
    passagers: totalPassengers,
    closed: isClosed
  });

  document.getElementById("count").innerText = totalPassengers;
  tempCount = 0;
};

// fermer / ouvrir
window.toggleClosed = () => {
  isClosed = !isClosed;

  const status = document.getElementById("status");

  if(isClosed){
    status.innerText = "🔴 FERMÉ";
    status.classList.add("closed");
  } else {
    status.innerText = "🟢 OUVERT";
    status.classList.remove("closed");
  }
};
</script>

</body>
</html
